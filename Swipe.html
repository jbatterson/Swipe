<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --yellow: #FFD600;
            --red: #FF3B30;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            --max-stage-size: calc(100dvh - 300px);
        }
        @supports not (height: 100dvh) {
            :root { --max-stage-size: calc(100vh - 300px); }
        }

        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Outfit', sans-serif;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            background-color: var(--white);
            display: flex; justify-content: center; align-items: flex-start;
        }

        #root { width: 100%; max-width: 500px; }

        .game-container {
            display: flex; flex-direction: column;
            width: 100%; padding: 20px;
            overscroll-behavior-y: contain;
            height: 100vh;
            height: -webkit-fill-available;
        }

        /* HEADER */
        .header-row {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            align-items: center; width: 100%;
            margin-bottom: 1.5rem;
        }
        .title {
            grid-column: 2; text-align: center; margin: 0;
            letter-spacing: 0.15em; text-transform: uppercase;
            font-weight: 900; font-size: 1.8rem;
        }
        .help-btn {
            grid-column: 3; justify-self: end;
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--black);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 900;
        }
        .left-spacer { grid-column: 1; }

        /* INFO BAR */
        .level-nav {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            margin-bottom: 1.5rem; width: 100%;
        }
        .selector-group {
            display: flex; align-items: center; justify-content: flex-start; gap: 2px;
        }
        .nav-arrow {
            background: none; border: none;
            font-size: 1.8rem; cursor: pointer; color: var(--black);
            line-height: 1; padding: 0 4px;
        }
        .nav-arrow.disabled { opacity: 0.1; cursor: default; pointer-events: none; }
        .level-label { text-align: center; }
        .level-label .sub { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .level-label .num { font-size: 1.8rem; font-weight: 900; line-height: 1; }
        .stats-group {
            text-align: right;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        .stats-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .stats-num   { font-size: 1.8rem; font-weight: 900; line-height: 1; }
        .stats-num.at-par   { color: #16a34a; }
        .stats-num.over-par { color: var(--red); }

        /* GAME STAGE */
        .game-stage {
            width: 100%;
            display: flex; justify-content: center; align-items: center;
            padding: 10px 0;
            flex-grow: 1; flex-shrink: 1; min-height: 0;
            touch-action: none;
        }
        #canvas-wrapper {
            width: 100%;
            max-width: min(460px, var(--max-stage-size));
            aspect-ratio: 1 / 1;
            position: relative; margin: 0 auto;
            background-color: var(--white);
            border: 2px solid var(--black);
            min-width: 280px;
        }

        /* GRID */
        .grid-overlay {
            position: absolute; inset: 0;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(7, 1fr);
            width: 100%; height: 100%;
        }
        .grid-line {
            border: 1px solid rgba(0,0,0,0.1);
            box-sizing: border-box; position: relative;
        }
        .grid-line.target::after {
            content: '';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background: var(--red); opacity: 0.25;
        }
        .grid-line.block { background: var(--black); }

        /* BALLS */
        .ball-layer {
            position: absolute;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; will-change: left, top;
            transition: left 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        top  0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .ball { width: 78%; height: 78%; border-radius: 50%; background: var(--red); }
        .ball.locked { opacity: 0.5; }

        /* BUTTONS */
        .button-tray {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-bottom: 12px;
        }
        .btn-primary, .btn-secondary {
            width: 100%; min-height: 60px; border-radius: 4px;
            font-weight: 900; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1rem; letter-spacing: 0.05em;
        }
        .btn-primary  { background: var(--black); color: var(--white); border: none; }
        .btn-secondary { background: var(--white); color: var(--black); border: 2px solid var(--black); }
        .btn-primary:active, .btn-secondary:active {
            transform: scale(0.96); filter: brightness(0.9); transition: transform 0.05s;
        }
        .btn-secondary:disabled {
            opacity: 0.35; cursor: not-allowed;
            border-color: rgba(0,0,0,0.35); color: rgba(0,0,0,0.45); transform: none;
        }

        .goal-text {
            text-align: center; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.06em; padding: 14px 0;
            color: rgba(0,0,0,0.4); font-size: 0.78rem;
        }
        .solved-banner {
            display: none; text-align: center; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.08em;
            padding: 14px 0; font-size: 0.95rem;
        }
        .solved-banner.visible { display: block; }
        .solved-banner.good { color: #16a34a; }
        .solved-banner.ok   { color: rgba(0,0,0,0.55); }

        /* NEXT PUZZLE button — shown after solve */
        .next-wrap {
            display: none; justify-content: center; padding-bottom: 8px;
        }
        .next-wrap.visible { display: flex; }

        /* MODAL */
        #instructions-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--white);
            display: flex; flex-direction: column; align-items: center;
            z-index: 100; padding: 40px 20px; overflow-y: auto;
        }
        .modal-content {
            width: 100%; max-width: 500px; padding: 40px 20px;
            display: flex; flex-direction: column; gap: 20px; position: relative;
        }
        .modal-close {
            position: absolute; top: 16px; right: 0;
            background: none; border: none;
            font-size: 22px; font-weight: 900; cursor: pointer; padding: 4px;
        }
        .modal-content p { font-size: 1rem; line-height: 1.65; text-align: center; }
        .key-hint { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .key {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
            background: var(--white); border: 2px solid var(--black);
            border-radius: 4px; font-size: 1.1rem; font-weight: 900;
        }

        /* HOVER */
        @media (hover: hover) {
            .btn-primary, .btn-secondary { transition: transform 0.08s ease, filter 0.12s ease; }
            .btn-primary:not(:disabled):hover  { filter: brightness(1.08); transform: translateY(-1px); }
            .btn-secondary:not(:disabled):hover { background-color: rgba(0,0,0,0.06); transform: translateY(-1px); }
            .help-btn:hover { transform: scale(1.08); background-color: rgba(0,0,0,0.06); }
            .nav-arrow:not(.disabled):hover { opacity: 0.55; }
        }
    </style>
</head>
<body>
<div id="root">
<div class="game-container">

    <div class="header-row">
        <div class="left-spacer"></div>
        <h1 class="title">Swipe</h1>
        <div class="help-btn" id="help-btn">?</div>
    </div>

    <div class="level-nav">
        <div class="selector-group">
            <button class="nav-arrow disabled" id="prev-btn">&#8592;</button>
            <button class="nav-arrow" id="next-btn">&#8594;</button>
        </div>
        <div class="level-label">
            <span class="sub">Puzzle</span>
            <span class="num" id="puzzle-num">1</span>
        </div>
        <div class="stats-group">
            <span class="stats-label">Moves</span>
            <span class="stats-num" id="move-counter">0</span>
        </div>
    </div>

    <div class="game-stage">
        <div id="canvas-wrapper">
            <div class="grid-overlay" id="grid-overlay"></div>
            <div id="ball-container"></div>
        </div>
    </div>

    <div class="button-tray">
        <button class="btn-secondary" id="undo-btn" disabled>Undo</button>
        <button class="btn-secondary" id="reset-btn">Reset</button>
    </div>

    <div class="goal-text" id="goal-text">Par: — &nbsp;|&nbsp; Slide all balls onto their targets</div>
    <div class="solved-banner" id="solved-banner"></div>

    <div id="instructions-overlay">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">✕</button>
            <h1 class="title" style="text-align:center; margin-bottom:0.5rem;">Swipe</h1>
            <p>
                Use the <strong>arrow keys</strong> to slide all balls in a direction.<br><br>
                Balls slide until they hit the <strong>edge</strong>, a <strong>black block</strong>, or another <strong>ball</strong>.<br><br>
                A ball that rolls onto a <strong>target</strong> locks in place and acts as a blocker for other balls.
            </p>
            <div class="key-hint">
                <span class="key">←</span>
                <span class="key">↑</span>
                <span class="key">↓</span>
                <span class="key">→</span>
            </div>
            <button class="btn-primary" id="play-btn">Play</button>
        </div>
    </div>

</div>
</div>

<script>
    // ── Puzzle data ───────────────────────────────────────────────────────────
    const PUZZLES = [
        { balls: [[6,5],[3,1],[0,5]], targets: [[2,4],[5,2],[5,1]], blocks: [[1,0],[3,4],[5,4]], par: 7, solution: "RDLDLUR" },
        { balls: [[5,0],[3,1],[3,3]], targets: [[2,4],[1,2],[2,1]], blocks: [[5,4],[1,1],[6,2]], par: 12, solution: "RURDLURULDRU"},
        { balls: [[6,5],[4,0],[5,4]], targets: [[2,2],[3,5],[1,6]], blocks: [[2,3],[6,4],[1,5]], par: 9, solution: "ULDRURURD" },
        { balls: [[2,0],[0,2],[5,3]], targets: [[5,1],[4,2],[1,3]], blocks: [[3,2],[0,3],[2,6]], par: 11 },
        { balls: [[2,3],[1,0],[1,5]], targets: [[5,1],[5,3],[4,2]], blocks: [[1,6],[2,1],[0,5]], par: 8 },
        { balls: [[6,2],[6,3],[4,3]], targets: [[1,3],[0,4],[4,4]], blocks: [[0,0],[2,1],[1,2]], par: 7 },
        { balls: [[1,3],[4,5],[2,4]], targets: [[3,1],[3,2],[0,4]], blocks: [[6,5],[0,5],[6,4],[4,4],[4,0]], par: 11, solution: "LURLURDULDR" },
        { balls: [[5,2],[2,0],[5,4]], targets: [[3,2],[2,3],[1,4]], blocks: [[5,3],[4,4],[6,0],[6,5],[6,6]], par: 9, solution: "URULDRURU" },
        { balls: [[1,4],[5,2],[6,5]], targets: [[0,2],[4,3],[4,4]], blocks: [[0,0],[3,5],[2,3]], par: 10, solution: "LDRLURDRUL" },
        { balls: [[6,2],[4,4],[6,0]], targets: [[5,5],[2,2],[4,1]], blocks: [[0,0],[5,4],[2,0]], par: 8, solution: "URDLRULD" },
        { balls: [[5,6],[4,3],[4,0]], targets: [[0,3],[3,1],[1,6]], blocks: [[5,4],[2,6],[0,6]], par: 8, solution: "DLULDLUR" },
        { balls: [[2,0],[1,0],[0,2]], targets: [[2,5],[4,3],[1,5]], blocks: [[2,1],[6,4],[3,5]], par: 15, solution: "DRDLURDRURULDRU" }, //very hard//

        { balls: [[6,0],[3,6],[6,3]], targets: [[1,1],[5,1],[6,6]], blocks: [[2,5],[5,0],[1,6]], par: 11, solution: "DRULURLDRDL" },
        { balls: [[0,5],[5,6],[3,6]], targets: [[1,3],[5,2],[1,4]], blocks: [[6,6],[4,5],[2,4]], par: 8, solution: "LRULRDLU" },
        { balls: [[6,4],[4,5],[2,2]], targets: [[5,1],[1,3],[6,1]], blocks: [[0,6],[1,6],[1,0]], par: 9, solution: "URDULDRDL" },
        { balls: [[1,4],[6,5],[3,3]], targets: [[2,0],[2,5],[4,4]], blocks: [[0,3],[4,5],[3,4]], par: 10, solution: "LDURURULDR" },
        { balls: [[0,2],[1,0],[6,2]], targets: [[3,4],[1,6],[5,4]], blocks: [[3,2],[2,0],[6,5]], par: 8, solution: "ULURURDL" },
        { balls: [[6,0],[6,4],[3,3]], targets: [[4,2],[3,1],[4,0]], blocks: [[6,2],[6,5],[5,1]], par: 8, solution: "URDLULDR" },
        { balls: [[1,1],[1,2],[2,4]], targets: [[2,0],[3,0],[5,0]], blocks: [[4,5],[1,6],[1,5]], par: 9, solution: "DLUDRURUL" },
        { balls: [[4,3],[1,3],[5,3]], targets: [[3,5],[3,3],[5,1]], blocks: [[0,4],[3,6],[0,6]], par: 10, solution: "LDRDRULURD" },
        { balls: [[1,2],[6,0],[5,6]], targets: [[2,4],[4,0],[5,4]], blocks: [[1,1],[2,1],[1,3]], par: 8, solution: "LUDLURUR" },
        { balls: [[3,5],[6,2],[4,1]], targets: [[2,1],[0,5],[1,4]], blocks: [[0,1],[2,2],[3,1]], par: 9, solution: "RDLURDRUL" },
        { balls: [[0,1],[3,6],[3,5]], targets: [[6,1],[3,2],[1,2]], blocks: [[3,1],[1,1],[1,6]], par: 13, solution: "ULURULDLDRDLU" },
        { balls: [[6,4],[5,0],[5,2]], targets: [[1,2],[4,0],[3,2]], blocks: [[6,6],[5,4],[4,6]], par: 10, solution: "DRURULRDLU" },
        { balls: [[5,5],[0,3],[1,4]], targets: [[6,4],[2,2],[3,5]], blocks: [[1,0],[3,0],[1,5]], par: 10, solution: "RULULDRDLU" },
        { balls: [[2,4],[3,4],[5,2]], targets: [[5,4],[4,4],[1,2]], blocks: [[4,6],[1,0],[4,2]], par: 13, solution: "DLURULRDLDRUL" },
        { balls: [[0,1],[6,0],[3,0]], targets: [[3,1],[4,1],[2,4]], blocks: [[1,1],[0,6],[3,5]], par: 9, solution: "RULDLURDL" },
        { balls: [[2,2],[3,0],[1,1]], targets: [[1,6],[0,4],[2,5]], blocks: [[4,6],[6,2],[0,3]], par: 11, solution: "LURDRDLURUL" },
        { balls: [[4,6],[3,6],[0,0]], targets: [[5,0],[6,3],[5,1]], blocks: [[3,5],[6,5],[2,4]], par: 11, solution: "RDLRDLDRULD" },
        { balls: [[4,0],[3,1],[5,3]], targets: [[4,1],[4,4],[6,4]], blocks: [[1,1],[4,2],[5,0]], par: 12, solution: "ULURURDLULDR" },
        { balls: [[4,2],[6,6],[1,6]], targets: [[4,4],[6,0],[3,4]], blocks: [[0,0],[6,2],[1,0]], par: 12, solution: "ULDRURDLULDL" },
        { balls: [[0,3],[0,4],[1,4]], targets: [[3,0],[2,2],[0,0]], blocks: [[1,0],[2,5],[4,6]], par: 10, solution: "RDRULULDLU" },
        { balls: [[5,3],[5,2],[0,4]], targets: [[3,6],[3,5],[1,6]], blocks: [[6,5],[4,4],[5,4],[6,1]], par: 8, solution: "DRLURDRD" },
        { balls: [[0,5],[3,3],[0,0]], targets: [[0,2],[2,2],[6,5]], blocks: [[5,0],[2,3],[6,2],[0,3]], par: 9, solution: "LDLULURDL" },
        { balls: [[1,0],[6,2],[3,2]], targets: [[3,3],[1,4],[4,4]], blocks: [[4,5],[4,0],[0,4],[3,6]], par: 12, solution: "URDURDRULDLD" },
        { balls: [[1,1],[3,0],[2,4]], targets: [[5,4],[2,6],[5,5]], blocks: [[0,2],[6,2],[4,1],[6,5]], par: 9, solution: "DLDRURURD" },
        { balls: [[4,1],[3,0],[4,6]], targets: [[3,2],[5,6],[1,6]], blocks: [[2,0],[3,1],[1,2],[5,4]], par: 11, solution: "LDRDLUDRURD" },
        { balls: [[6,6],[5,1],[2,3]], targets: [[5,5],[4,1],[4,3]], blocks: [[1,6],[2,2],[3,6],[5,4]], par: 9, solution: "LULDRDRUL" },
        { balls: [[3,2],[2,4],[2,5]], targets: [[5,6],[2,6],[3,6]], blocks: [[1,2],[6,4],[0,3],[3,4]], par: 10, solution: "LURDLDRURD" },
        { balls: [[2,6],[1,0],[5,3]], targets: [[5,2],[1,2],[5,4]], blocks: [[4,6],[3,0],[5,0],[1,6]], par: 8, solution: "LRDLDRUL" },
        { balls: [[3,1],[6,6],[2,4]], targets: [[0,5],[1,2],[5,5]], blocks: [[2,3],[2,0],[2,1],[1,6]], par: 8, solution: "ULDRULUR" },
        { balls: [[1,4],[2,6],[3,5]], targets: [[4,1],[6,0],[1,2]], blocks: [[1,1],[4,3],[6,1],[5,5]], par: 19, solution: "DLDRULDLDRULDLDRDLU" },



  


    ];

    const GRID = 7;

    let puzzleIdx   = 0;
    let balls       = [];
    let targets     = [];
    let blocks      = [];
    let history     = [];
    let moves       = 0;
    let isAnimating = false;
    let solved      = false;

    const wrapper        = document.getElementById('canvas-wrapper');
    const ballContainer  = document.getElementById('ball-container');
    const undoBtn        = document.getElementById('undo-btn');
    const resetBtn       = document.getElementById('reset-btn');
    const moveCounter    = document.getElementById('move-counter');
    const gridOverlay    = document.getElementById('grid-overlay');
    const puzzleNumEl    = document.getElementById('puzzle-num');
    const prevBtn        = document.getElementById('prev-btn');
    const nextBtn        = document.getElementById('next-btn');
    const goalText       = document.getElementById('goal-text');
    const solvedBanner   = document.getElementById('solved-banner');

    // ── Grid cells (built once) ───────────────────────────────────────────────
    const cellEls = [];
    for (let i = 0; i < GRID * GRID; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-line';
        gridOverlay.appendChild(cell);
        cellEls.push(cell);
    }
    function cellEl(r, c) { return cellEls[r * GRID + c]; }

    function applyGridClasses() {
        cellEls.forEach(el => { el.className = 'grid-line'; });
        targets.forEach(t => cellEl(t.row, t.col).classList.add('target'));
        blocks.forEach(b  => cellEl(b.row, b.col).classList.add('block'));
    }

    // ── Geometry ──────────────────────────────────────────────────────────────
    function cellSize()    { return wrapper.offsetWidth / GRID; }
    function ballLeft(col) { return col * cellSize(); }
    function ballTop(row)  { return row * cellSize(); }

    // ── Load puzzle ───────────────────────────────────────────────────────────
    function loadPuzzle(idx) {
        puzzleIdx = idx;
        const p = PUZZLES[idx];

        balls   = p.balls.map(([r, c], i) => ({ id: i, row: r, col: c, locked: false }));
        targets = p.targets.map(([r, c])   => ({ row: r, col: c }));
        blocks  = p.blocks.map(([r, c])    => ({ row: r, col: c }));

        history = []; moves = 0; solved = false;

        moveCounter.textContent = '0';
        moveCounter.className   = 'stats-num';
        puzzleNumEl.textContent = idx + 1;
        goalText.textContent    = `Par: ${p.par}  |  Slide all balls onto their targets`;
        goalText.style.display  = 'block';
        solvedBanner.className  = 'solved-banner';

        prevBtn.classList.toggle('disabled', idx === 0);
        nextBtn.classList.toggle('disabled', idx === PUZZLES.length - 1);

        ballContainer.innerHTML = '';
        applyGridClasses();
        renderBalls(false);
        updateButtons();
    }

    // ── Ball DOM ──────────────────────────────────────────────────────────────
    function createBallEl(ball) {
        const div = document.createElement('div');
        div.className = 'ball-layer';
        div.id = `ball-${ball.id}`;
        const cs = cellSize();
        div.style.cssText = `width:${cs}px;height:${cs}px;left:${ballLeft(ball.col)}px;top:${ballTop(ball.row)}px;transition:none`;
        const inner = document.createElement('div');
        inner.className = 'ball' + (ball.locked ? ' locked' : '');
        div.appendChild(inner);
        return div;
    }

    function renderBalls(animate = true) {
        const cs = cellSize();
        balls.forEach(ball => {
            let el = document.getElementById(`ball-${ball.id}`);
            if (!el) {
                el = createBallEl(ball);
                ballContainer.appendChild(el);
                requestAnimationFrame(() => { el.style.transition = ''; });
            } else {
                if (!animate) el.style.transition = 'none';
                el.style.width  = cs + 'px';
                el.style.height = cs + 'px';
                el.style.left   = ballLeft(ball.col) + 'px';
                el.style.top    = ballTop(ball.row)  + 'px';
                el.firstChild.className = 'ball' + (ball.locked ? ' locked' : '');
                if (!animate) requestAnimationFrame(() => { el.style.transition = ''; });
            }
        });
    }

    // ── Solve check ───────────────────────────────────────────────────────────
    function checkSolved() {
        const allDone = targets.every(t =>
            balls.some(b => b.locked && b.row === t.row && b.col === t.col)
        );
        if (!allDone || solved) return;
        solved = true;

        const par = PUZZLES[puzzleIdx].par;
        const good = moves <= par;

        moveCounter.className = 'stats-num ' + (good ? 'at-par' : 'over-par');
        goalText.style.display = 'none';

        solvedBanner.textContent = good
            ? `Solved in ${moves} — at par! 🎉`
            : `Solved in ${moves}  (par ${par})`;
        solvedBanner.className = 'solved-banner visible ' + (good ? 'good' : 'ok');
    }

    // ── Undo ──────────────────────────────────────────────────────────────────
    function updateButtons() { undoBtn.disabled = history.length === 0; }

    function undo() {
        if (history.length === 0 || isAnimating) return;
        const prev = history.pop();
        balls  = prev.balls;
        moves  = prev.moves;
        solved = false;
        moveCounter.textContent = moves;
        moveCounter.className   = 'stats-num';
        goalText.style.display  = 'block';
        solvedBanner.className  = 'solved-banner';
        renderBalls(false);
        updateButtons();
    }

    // ── Slide ─────────────────────────────────────────────────────────────────
    function isBlockAt(r, c) { return blocks.some(b => b.row === r && b.col === c); }

    function slide(dir) {
        if (isAnimating || solved) return;

        const next = balls.map(b => ({ ...b }));

        let sorted;
        if (dir === 'left')  sorted = next.slice().sort((a, b) => a.col - b.col);
        if (dir === 'right') sorted = next.slice().sort((a, b) => b.col - a.col);
        if (dir === 'up')    sorted = next.slice().sort((a, b) => a.row - b.row);
        if (dir === 'down')  sorted = next.slice().sort((a, b) => b.row - a.row);

        let moved = false;

        sorted.forEach(ball => {
            if (ball.locked) return;
            let r = ball.row, c = ball.col;
            while (true) {
                let nr = r, nc = c;
                if (dir === 'left')  nc--;
                if (dir === 'right') nc++;
                if (dir === 'up')    nr--;
                if (dir === 'down')  nr++;
                if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) break;
                if (isBlockAt(nr, nc)) break;
                if (next.some(o => o.id !== ball.id && o.row === nr && o.col === nc)) break;
                r = nr; c = nc;
                if (targets.some(t => t.row === r && t.col === c)) {
                    ball.locked = true;
                    break;
                }
            }
            if (r !== ball.row || c !== ball.col) moved = true;
            ball.row = r; ball.col = c;
        });

        if (!moved) return;

        history.push({ balls: balls.map(b => ({ ...b })), moves });
        moves++;
        moveCounter.textContent = moves;

        sorted.forEach(updated => {
            const orig = balls.find(b => b.id === updated.id);
            orig.row = updated.row; orig.col = updated.col; orig.locked = updated.locked;
        });

        isAnimating = true;
        renderBalls(true);
        setTimeout(() => { isAnimating = false; checkSolved(); }, 260);
        updateButtons();
    }

    // ── Input ─────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
        if (map[e.key]) { e.preventDefault(); slide(map[e.key]); }
    });

    undoBtn.addEventListener('click', undo);
    resetBtn.addEventListener('click', () => loadPuzzle(puzzleIdx));
    prevBtn.addEventListener('click', () => { if (puzzleIdx > 0) loadPuzzle(puzzleIdx - 1); });
    nextBtn.addEventListener('click', () => { if (puzzleIdx < PUZZLES.length - 1) loadPuzzle(puzzleIdx + 1); });

    document.getElementById('modal-close').addEventListener('click', () => {
        document.getElementById('instructions-overlay').style.display = 'none';
    });
    document.getElementById('play-btn').addEventListener('click', () => {
        document.getElementById('instructions-overlay').style.display = 'none';
    });
    document.getElementById('help-btn').addEventListener('click', () => {
        document.getElementById('instructions-overlay').style.display = 'flex';
    });

    window.addEventListener('resize', () => renderBalls(false));

    loadPuzzle(0);
</script>
</body>
</html>
